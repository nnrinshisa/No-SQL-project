<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Food Decision System</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            max-width: 1200px;
            padding: 30px;
        }
        .mood-btn {
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px;
            margin: 5px;
            transition: all 0.3s ease;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .mood-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        .mood-btn.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .food-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            margin: 10px 0;
        }
        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        .confidence-badge {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .nav-pills .nav-link {
            border-radius: 10px;
            margin: 0 5px;
        }
        .nav-pills .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .stats-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin: 10px 0;
        }
        .history-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }
    </style>
</head>

<body>
<div class="container main-container">

    <header class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">
            <i class="fas fa-utensils me-3"></i>Smart Food Decision System
        </h1>
        <p class="lead text-muted">Get personalized food recommendations based on your mood, budget, and time</p>
    </header>

    <!-- Tabs -->
    <ul class="nav nav-pills nav-fill mb-4">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#recommend">
                <i class="fas fa-magic me-2"></i>Get Recommendation
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#manage">
                <i class="fas fa-cog me-2"></i>Manage Foods
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#history">
                <i class="fas fa-history me-2"></i>History
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#analytics">
                <i class="fas fa-chart-bar me-2"></i>Analytics
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- Recommendation -->
        <div class="tab-pane fade show active" id="recommend">
            <div class="row">
                <div class="col-lg-6">

                    <!-- Mood -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5>How are you feeling?</h5>
                            <div>
                                <button class="btn mood-btn" data-mood="happy">Happy</button>
                                <button class="btn mood-btn" data-mood="sad">Sad</button>
                                <button class="btn mood-btn" data-mood="stressed">Stressed</button>
                                <button class="btn mood-btn" data-mood="hungry">Hungry</button>
                                <button class="btn mood-btn" data-mood="lazy">Lazy</button>
                                <button class="btn mood-btn" data-mood="excited">Excited</button>
                            </div>
                        </div>
                    </div>

                    <!-- Form -->
                    <div class="card">
                        <div class="card-body">
                            <form id="recommendationForm">
                                <input class="form-control mb-2" id="userId" placeholder="User ID" required>
                                <input class="form-control mb-2" id="budget" type="number" placeholder="Budget" required>
                                <input class="form-control mb-2" id="timeAvailable" type="number" placeholder="Time (min)" required>
                                <button class="btn btn-primary w-100">Recommend</button>
                            </form>
                        </div>
                    </div>

                </div>

                <div class="col-lg-6">
                    <div id="recommendationPlaceholder" class="text-center">Waiting...</div>
                    <div id="recommendationResult" class="d-none">
                        <div id="topRecommendation"></div>
                        <div id="alternativeRecommendations"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Manage -->
        <div class="tab-pane fade" id="manage">
            <div class="row">
                <div class="col-lg-4">

                    <form id="addFoodForm">
                        <input id="foodName" class="form-control mb-2" placeholder="Food Name" required>
                        <input id="foodCategory" class="form-control mb-2" placeholder="Category" required>
                        <input id="minPrice" type="number" class="form-control mb-2" placeholder="Min Price">
                        <input id="maxPrice" type="number" class="form-control mb-2" placeholder="Max Price">
                        <input id="prepTime" type="number" class="form-control mb-2" placeholder="Time">
                        <button class="btn btn-primary w-100">Add Food</button>
                    </form>

                </div>

                <div class="col-lg-8">
                    <div id="foodList"></div>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="tab-pane fade" id="history">
            <input id="historyUserId" class="form-control mb-2" placeholder="User ID">
            <button onclick="loadHistory()" class="btn btn-primary mb-2">Load</button>
            <div id="historyList"></div>
        </div>

        <!-- Analytics -->
        <div class="tab-pane fade" id="analytics">
            <button onclick="loadAnalytics()" class="btn btn-primary mb-3">Load Analytics</button>
            <div id="analyticsContent"></div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>

</body>
</html>
